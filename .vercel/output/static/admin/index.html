<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Balkrishna Driving School</title>
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="/css/admin.css">

  <!-- Suppress rendering until auth confirmed -->
  <style>html { display: none; }</style>

  <!-- CDNs for Supabase and JSPDF -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Env config loader -->
  <script src="/api/admin-config.js"></script>

  <!-- Auth and Session Gatekeeper -->
  <script type="module">
    import { getSession } from '/js/admin-auth.js';
    (async () => {
      const session = await getSession();
      if (!session) {
        window.location.replace('/admin/login');
      } else {
        document.documentElement.style.display = 'block';
      }
    })();
  </script>
</head>
<body>

  <!-- Admin Panel Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">B</div>
      <div class="brand-text">
        Balkrishna
        <span>Admin Panel</span>
      </div>
    </div>

    <nav class="sidebar-menu">
      <a href="#/dashboard" class="menu-link" id="link-dashboard">

        </svg>
        Dashboard
      </a>
      <a href="#/enquiries" class="menu-link" id="link-enquiries">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />

          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5m-9-6h.008v.008H12v-.008zM12 15h.008v.008H12V15zm0 2.25h.008v.008H12v-.008zM9.75 15h.008v.008H9.75V15zm0 2.25h.008v.008H9.75v-.008zM7.5 15h.008v.008H7.5V15zm0 2.25h.008v.008H7.5v-.008zm6.75-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V15zm0 2.25h.008v.008h-.008v-.008zm2.25-4.5h.008v.008H16.5v-.008zm0 2.25h.008v.008H16.5V15z" />
        </svg>
        Scheduling
      </a>
      <a href="#/attendance" class="menu-link" id="link-attendance">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Attendance
      </a>
      <a href="#/trainees" class="menu-link" id="link-trainees">

          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0112 20.25a11.38 11.38 0 01-3-.122v-.109m0-1.018a9.38 9.38 0 00-2.625.372 9.337 9.337 0 00-4.121-.952 4.125 4.125 0 017.533-2.493M9 18.018v-.003c0-1.113.285-2.16.786-3.07m0 0a9.38 9.38 0 010-6.14m0 0a5.25 5.25 0 123.333 0m-3.333 0c.34-.1.694-.15 1.056-.15.362 0 .717.05 1.057.15M15 11.25a3 3 0 11-6 0 3 3 0 016 0zm-9 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm19.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
        </svg>
        Trainees
      </a>
      <a href="#/rto-forms" class="menu-link" id="link-rto-forms">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>
        RTO Registers
      </a>
      <a href="#/offers" class="menu-link" id="link-offers">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581a1.125 1.125 0 001.591 0l4.318-4.318a1.125 1.125 0 000-1.591l-9.581-9.581A2.25 2.25 0 009.568 3z" />

        </svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" id="logout-button">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:20px;height:20px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M19 12H9m10 0l-3-3m3 3l-3 3" />
        </svg>
        Log Out
      </button>
    </div>
  </aside>

  <!-- Admin Main Content Viewport -->
  <div class="admin-layout">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-title">
        <h1 id="view-title">Dashboard</h1>
      </div>
      <div class="header-user">
        <div class="user-avatar" id="user-avatar-initials">A</div>
        <span id="user-email-display">admin@balkrishnadriving.com</span>
      </div>
    </header>

    <!-- Content Area -->
    <main class="admin-content" id="view-container">
      <div class="loading-box">
        <svg class="spinner" viewBox="0 0 50 50" style="animation: rotate 2s linear infinite; width: 40px; height: 40px; color: var(--color-gold);">
          <circle class="path" cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" style="stroke-dasharray: 1, 150; stroke-dashoffset: 0; animation: dash 1.5s ease-in-out infinite;"></circle>
        </svg>
        Loading Dashboard...
      </div>
    </main>
  </div>

  <!-- Dynamic Views Modals / Forms Container -->
  <div id="modal-container"></div>

  <!-- App scripts -->
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
