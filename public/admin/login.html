<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Balkrishna Driving School</title>
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="/css/style.css">
  
  <style>
    /* Dark mode override for login page */
    body {
      background-color: var(--color-ink-navy);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--color-text-white);
    }
    
    .login-container {
      max-width: 420px;
      width: 100%;
      padding: 40px;
      background-color: var(--color-navy-dark);
      border: 1px solid var(--color-border-dark);
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 35px;
      text-align: center;
    }
    
    .login-logo-icon {
      width: 50px;
      height: 50px;
      background-color: var(--color-gold);
      color: var(--color-ink-navy);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-weight: 800;
      font-size: 1.75rem;
    }
    
    .login-logo-text {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--color-text-white);
    }
    
    .login-logo-text span {
      display: block;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--color-gold);
      margin-top: 2px;
    }
    
    .login-error {
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--color-error);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 24px;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    
    .login-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .login-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-gold-light);
    }
    
    .login-input {
      background-color: var(--color-navy-medium);
      border: 1px solid var(--color-border-dark);
      border-radius: 6px;
      padding: 12px 16px;
      color: var(--color-text-white);
      font-size: 0.95rem;
      transition: var(--transition-fast);
    }
    
    .login-input:focus {
      border-color: var(--color-gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }
    
    .login-submit {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      margin-top: 10px;
    }
  </style>

  <!-- Prevent Content Flashing & Immediate Auth check -->
  <style>html { display: none; }</style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Env config loader -->
  <script src="/api/admin-config.js"></script>
  <script type="module">
    import { getSession } from '/js/admin-auth.js';
    (async () => {
      const session = await getSession();
      if (session) {
        window.location.replace('/admin');
      } else {
        document.documentElement.style.display = 'block';
      }
    })();
  </script>
</head>
<body>

  <div class="login-container">
    <div class="login-logo">
      <div class="login-logo-icon">B</div>
      <div class="login-logo-text">
        Balkrishna
        <span>Admin Portal</span>
      </div>
    </div>

    <!-- Generic Error Display -->
    <div id="error-message" class="login-error">Invalid email or password.</div>

    <form id="login-form">
      <div class="login-group">
        <label for="email" class="login-label">Email Address</label>
        <input type="email" id="email" class="login-input" placeholder="admin@balkrishnadriving.com" required>
      </div>

      <div class="login-group">
        <label for="password" class="login-label">Password</label>
        <input type="password" id="password" class="login-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary login-submit">Log In</button>
    </form>
  </div>

  <!-- Auth Script handler -->
  <script type="module">
    import { loginAdmin } from '/js/admin-auth.js';

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const submitBtn = form.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerText;
      submitBtn.disabled = true;
      submitBtn.innerText = 'Verifying...';

      try {
        const { data, error } = await loginAdmin(email, password);
        
        if (error) {
          console.error('Auth Error:', error.message);
          errorMsg.style.display = 'block';
        } else if (data && data.session) {
          console.log('Login successful.');
          window.location.replace('/admin');
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        console.error('Fatal Auth Error:', err);
        errorMsg.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = originalText;
      }
    });
  </script>
</body>
</html>
